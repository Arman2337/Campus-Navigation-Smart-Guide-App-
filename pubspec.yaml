name: uninav
description: UniNav - Smart Campus Navigation App by UniNav Solutions
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.1.0
  google_sign_in: ^6.2.1

  # Maps & Location
  google_maps_flutter: ^2.7.0
  flutter_polyline_points: ^2.0.1
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # UI & Animation
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # State & Navigation
  provider: ^6.1.2
  go_router: ^14.2.0

  # Voice & TTS
  flutter_tts: ^4.0.2

  # Storage & Cache
  shared_preferences: ^2.3.1
  flutter_cache_manager: ^3.3.1
  connectivity_plus: ^6.0.5

  # Image Picker
  image_picker: ^1.1.2

  # HTTP
  http: ^1.2.2

  # Permissions
  permission_handler: ^11.3.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
